<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viva Engage-dump</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 960px; margin: 2rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 { font-size: 1.4rem; }
    .card { border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .stats { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .stat b { display: block; font-size: 1.6rem; }
    .stat span { font-size: .85rem; opacity: .7; }
    button { padding: .5rem 1rem; border-radius: 6px; border: 1px solid #8886;
             background: #2563eb; color: #fff; cursor: pointer; font-size: .95rem; }
    button.sec { background: transparent; color: inherit; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    textarea { width: 100%; box-sizing: border-box; font-family: monospace; }
    pre { background: #8881; padding: .75rem; border-radius: 6px; overflow: auto;
          max-height: 240px; font-size: .8rem; }
    table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    td, th { text-align: left; padding: .25rem .5rem; border-bottom: 1px solid #8883; }
    .ok { color: #16a34a; } .pend { color: #ca8a04; } .skip { color: #dc2626; }
    .badge { padding: .1rem .5rem; border-radius: 999px; font-size: .75rem; background: #8882; }
    .warn { color: #dc2626; font-weight: 600; }
    .bar { background: #8883; border-radius: 6px; height: 14px; overflow: hidden; margin-top: .35rem; }
    .bar > i { display: block; height: 100%; background: #16a34a; transition: width .4s; }
  </style>
</head>
<body>
  <h1>Viva Engage-dump <a href="/arkiv" style="font-size:.9rem;font-weight:400">→ öppna arkivet</a></h1>

  <div class="card">
    <div id="token-line">Laddar...</div>
    <div style="margin-top:.5rem; font-size:.9rem">
      <a href="/viva-token-sync.user.js">Installera token-sync (Tampermonkey)</a>
      - matar panelen automatiskt från din webbläsare.
    </div>
    <details style="margin-top:.5rem">
      <summary>Klistra in ny token manuellt</summary>
      <form method="post" action="/token" style="margin-top:.5rem">
        <textarea name="token" rows="4" placeholder="Klistra in bearer-token (utan 'Bearer ')"></textarea>
        <button type="submit" style="margin-top:.5rem">Spara token</button>
      </form>
    </details>
  </div>

  <div class="card">
    <div class="stats" id="stats"></div>
    <div style="margin-top:1rem" id="controls"></div>
    <div id="run-line" style="margin-top:.75rem"></div>
    <div id="thread-line" style="margin-top:.75rem"></div>
    <div id="archive-line" style="margin-top:.75rem; border-top:1px solid #8883; padding-top:.75rem"></div>
  </div>

  <div class="card">
    <strong>Logg</strong>
    <pre id="log">-</pre>
  </div>

  <div class="card">
    <strong>Communities</strong>
    <table><thead><tr><th>Namn</th><th>Sidor</th><th>Status</th></tr></thead>
    <tbody id="rows"></tbody></table>
  </div>

<script>
async function post(url) {
  await fetch(url, { method: "POST" });
  refresh();
}
function fmtDur(s) {
  if (s == null) return "";
  if (s < 0) return "utgången";
  const m = Math.floor(s / 60);
  return m + " min " + (s % 60) + " s";
}
function fmtBytes(b) {
  if (!b) return "0 B";
  const u = ["B", "KB", "MB", "GB"];
  let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + " " + u[i];
}
async function refresh() {
  let d;
  try { d = await (await fetch("/api/status")).json(); }
  catch { return; }
  const t = d.token;
  let tl;
  if (!t.set) tl = '<span class="warn">Ingen token satt.</span>';
  else {
    const exp = t.expires_in;
    const cls = (exp != null && exp < 300) ? "warn" : "";
    tl = `Token: ${t.upn || "okänd"} - <span class="${cls}">giltig ${fmtDur(exp)}</span>`;
  }
  document.getElementById("token-line").innerHTML = tl;

  const p = d.progress;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><b>${p.done}/${p.groups_total}</b><span>grupper klara</span></div>
    <div class="stat"><b>${p.pages}</b><span>sidor hämtade</span></div>
    <div class="stat"><b>${p.skipped}</b><span>hoppade (ingen åtkomst)</span></div>
    <div class="stat"><b>${p.attachments}</b><span>bilagor</span></div>
    <div class="stat"><b>${fmtBytes(p.bytes_raw)}</b><span>rådata</span></div>
    <div class="stat"><b>${fmtBytes(p.bytes_attachments)}</b><span>bilagor på disk</span></div>`;

  const running = d.running;
  let ctrl;
  if (running) {
    ctrl = `<span class="badge">kör: ${running.kind}</span>
            <button class="sec" onclick="post('/stop')">Stoppa</button>`;
  } else {
    ctrl = `<button onclick="post('/start/dump')">Starta/återuppta dump</button>
            <button class="sec" onclick="post('/start/threads')">Komplettera trådar</button>
            <button class="sec" onclick="post('/start/update')">Uppdatera (hämta nya)</button>
            <button class="sec" onclick="post('/start/download')">Ladda ner bilagor</button>`;
  }
  document.getElementById("controls").innerHTML = ctrl;
  document.getElementById("log").textContent = d.log || "-";

  const th = d.threads;
  const tl = document.getElementById("thread-line");
  if (th) {
    const seen = th.done + th.skipped;
    const pct = th.total ? Math.floor((100 * seen) / th.total) : 0;
    const eta = th.eta_seconds != null ? fmtDur(th.eta_seconds) : "beräknar…";
    const rate = th.rate_per_min != null ? " · " + th.rate_per_min + "/min" : "";
    tl.innerHTML =
      `<b>Trådkomplettering</b> ${th.done} / ${th.total} klara (${pct}%)` +
      (th.skipped ? ` · ${th.skipped} hoppade` : "") +
      ` · ETA ${eta}${rate}` +
      `<div class="bar"><i style="width:${pct}%"></i></div>`;
  } else {
    tl.innerHTML = "";
  }

  const a = d.archive || {};
  const built = a.built_at ? new Date(a.built_at * 1000).toLocaleString() : "aldrig byggt";
  document.getElementById("archive-line").innerHTML = a.building
    ? `<span class="badge">bygger om arkivet…</span>`
    : `Arkiv: senast byggt ${built}
       <button class="sec" onclick="post('/build')">Bygg om arkivet</button>
       <a href="/arkiv" style="margin-left:.5rem">öppna →</a>`;

  document.getElementById("rows").innerHTML = p.rows.map(r => {
    const c = r.status === "klar" ? "ok" : r.status === "hoppad" ? "skip" : "pend";
    return `<tr><td>${r.name}</td><td>${r.pages}</td>
            <td class="${c}">${r.status}</td></tr>`;
  }).join("");
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
