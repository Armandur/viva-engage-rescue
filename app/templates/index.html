<!DOCTYPE html>
<html lang="sv" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viva Engage-dump</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    if (matchMedia("(prefers-color-scheme: dark)").matches)
      document.documentElement.setAttribute("data-bs-theme", "dark");
  </script>
  <style>
    body { max-width: 960px; }
    #log { max-height: 240px; overflow: auto; font-size: .8rem; white-space: pre-wrap; }
  </style>
</head>
<body class="container py-4">
  <div class="d-flex align-items-baseline justify-content-between mb-3">
    <h1 class="h4 mb-0">Viva Engage-dump</h1>
    <a href="/arkiv">öppna arkivet →</a>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div id="token-line">Laddar…</div>
      <div class="mt-2 small">
        <a href="/viva-token-sync.user.js">Installera token-sync (Tampermonkey)</a>
        - matar panelen automatiskt från din webbläsare.
      </div>
      <details class="mt-2">
        <summary>Klistra in ny token manuellt</summary>
        <form method="post" action="/token" class="mt-2">
          <textarea name="token" rows="4" class="form-control font-monospace"
                    placeholder="Klistra in bearer-token (utan 'Bearer ')"></textarea>
          <button type="submit" class="btn btn-primary btn-sm mt-2">Spara token</button>
        </form>
      </details>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row text-center g-2" id="stats"></div>
      <div class="mt-3" id="controls"></div>
      <div id="run-line" class="mt-3"></div>
      <div id="thread-line" class="mt-3"></div>
      <hr>
      <div id="archive-line"></div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h2 class="h6">Logg</h2>
      <pre id="log" class="mb-0">-</pre>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h2 class="h6">Communities</h2>
      <table class="table table-sm mb-0">
        <thead><tr><th>Namn</th><th>Sidor</th><th>Status</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
async function post(url) { await fetch(url, { method: "POST" }); refresh(); }
function fmtDur(s) {
  if (s == null) return "";
  if (s < 0) return "utgången";
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? `${h} h ${m} min` : `${m} min ${s % 60} s`;
}
function fmtBytes(b) {
  if (!b) return "0 B";
  const u = ["B", "KB", "MB", "GB"]; let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i ? 1 : 0) + " " + u[i];
}
function stat(value, label) {
  return `<div class="col"><div class="h4 mb-0">${value}</div>` +
         `<small class="text-secondary">${label}</small></div>`;
}
async function refresh() {
  let d;
  try { d = await (await fetch("/api/status")).json(); } catch { return; }

  const t = d.token;
  let tl;
  if (!t.set) tl = '<span class="text-danger fw-semibold">Ingen token satt.</span>';
  else {
    const exp = t.expires_in;
    const cls = (exp != null && exp < 300) ? "text-danger fw-semibold" : "";
    tl = `Token: ${t.upn || "okänd"} - <span class="${cls}">giltig ${fmtDur(exp)}</span>`;
  }
  document.getElementById("token-line").innerHTML = tl;

  const p = d.progress;
  document.getElementById("stats").innerHTML =
    stat(`${p.done}/${p.groups_total}`, "grupper klara") +
    stat(p.pages, "sidor") +
    stat(p.skipped, "hoppade") +
    stat(p.attachments, "bilagor") +
    stat(fmtBytes(p.bytes_raw), "rådata") +
    stat(fmtBytes(p.bytes_attachments), "bilagor på disk");

  const running = d.running;
  let ctrl;
  if (running) {
    ctrl = `<span class="badge text-bg-success me-2">kör: ${running.kind}</span>` +
           `<button class="btn btn-outline-secondary btn-sm" onclick="post('/stop')">Stoppa</button>`;
  } else {
    ctrl =
      `<button class="btn btn-primary btn-sm me-1" onclick="post('/start/dump')">Starta/återuppta dump</button>` +
      `<button class="btn btn-outline-secondary btn-sm me-1" onclick="post('/start/threads')">Komplettera trådar</button>` +
      `<button class="btn btn-outline-secondary btn-sm me-1" onclick="post('/start/update')">Uppdatera (hämta nya)</button>` +
      `<button class="btn btn-outline-secondary btn-sm" onclick="post('/start/download')">Ladda ner bilagor</button>`;
  }
  document.getElementById("controls").innerHTML = ctrl;
  document.getElementById("log").textContent = d.log || "-";

  const th = d.threads;
  const tline = document.getElementById("thread-line");
  if (th) {
    const seen = th.done + th.skipped;
    const pct = th.total ? Math.floor((100 * seen) / th.total) : 0;
    const eta = th.eta_seconds != null ? fmtDur(th.eta_seconds) : "beräknar…";
    const rate = th.rate_per_min != null ? " · " + th.rate_per_min + "/min" : "";
    tline.innerHTML =
      `<div class="d-flex justify-content-between small">` +
      `<span><b>Trådkomplettering</b> ${th.done} / ${th.total} klara` +
      (th.skipped ? ` · ${th.skipped} hoppade` : "") + `</span>` +
      `<span>ETA ${eta}${rate}</span></div>` +
      `<div class="progress mt-1" role="progressbar"><div class="progress-bar bg-success" style="width:${pct}%">${pct}%</div></div>`;
  } else {
    tline.innerHTML = "";
  }

  const a = d.archive || {};
  const built = a.built_at ? new Date(a.built_at * 1000).toLocaleString() : "aldrig byggt";
  document.getElementById("archive-line").innerHTML = a.building
    ? `<span class="badge text-bg-warning">bygger om arkivet…</span>`
    : `<span class="me-2">Arkiv: senast byggt ${built}</span>` +
      `<button class="btn btn-outline-secondary btn-sm" onclick="post('/build')">Bygg om arkivet</button>` +
      `<a href="/arkiv" class="ms-2">öppna →</a>`;

  document.getElementById("rows").innerHTML = p.rows.map(r => {
    const c = r.status === "klar" ? "text-success" : r.status === "hoppad" ? "text-danger" : "text-warning";
    return `<tr><td>${r.name}</td><td>${r.pages}</td><td class="${c}">${r.status}</td></tr>`;
  }).join("");
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
