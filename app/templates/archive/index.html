{% extends "archive/base.html" %}
{% block content %}
<p class="text-secondary">{{ stats["m"] }} meddelanden från {{ communities|length }} communities,
  {{ stats["u"] }} användare.</p>
<div class="list-group">
  {% for c in communities %}
  <a class="list-group-item list-group-item-action d-flex justify-content-between"
     href="/arkiv/c/{{ c['id'] }}">
    <span>{{ c["full_name"] }}</span>
    <span class="badge text-bg-secondary rounded-pill">{{ c["message_count"] }}</span>
  </a>
  {% endfor %}
</div>
{% endblock %}
