<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viva-arkiv{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 920px; margin: 0 auto;
           padding: 1rem; line-height: 1.5; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
             border-bottom: 1px solid #8884; padding-bottom: .75rem; margin-bottom: 1rem; }
    header .brand { font-weight: 700; }
    form.search { flex: 1; display: flex; gap: .5rem; min-width: 240px; }
    form.search input { flex: 1; padding: .45rem .6rem; border-radius: 6px;
                        border: 1px solid #8886; background: transparent; color: inherit; }
    form.search button { padding: .45rem .9rem; border-radius: 6px; border: 0;
                         background: #2563eb; color: #fff; cursor: pointer; }
    .muted { opacity: .65; font-size: .85rem; }
    .card { border: 1px solid #8883; border-radius: 8px; padding: .75rem 1rem; margin: .6rem 0; }
    .msg { border-left: 3px solid #8884; padding: .25rem .75rem; margin: .75rem 0; }
    .msg .meta { font-size: .8rem; opacity: .7; }
    .body { white-space: pre-wrap; word-wrap: break-word; }
    mark { background: #fde047; color: #000; }
    ul.clean { list-style: none; padding: 0; }
    ul.clean li { padding: .4rem 0; border-bottom: 1px solid #8882; }
    .att { font-size: .85rem; }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/arkiv">Viva-arkiv</a>
    <form class="search" action="/arkiv/sok" method="get">
      <input name="q" value="{{ q|default('') }}" placeholder="Sök i alla meddelanden…" autofocus>
      <button type="submit">Sök</button>
    </form>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
