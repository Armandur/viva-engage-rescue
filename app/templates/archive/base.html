<!DOCTYPE html>
<html lang="sv" data-bs-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Viva-arkiv{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script>
    if (matchMedia("(prefers-color-scheme: dark)").matches)
      document.documentElement.setAttribute("data-bs-theme", "dark");
  </script>
  <style>
    body { max-width: 920px; }
    .body { white-space: pre-wrap; word-wrap: break-word; }
    mark { padding: 0; }
    .lvl1 { border-left: 3px solid #0d6efd !important; }
    .lvl2 { border-left: 3px solid #20c997 !important; }
    .lvl3 { border-left: 3px solid #fd7e14 !important; }
    .lvl4 { border-left: 3px solid #d63384 !important; }
    .lvl5 { border-left: 3px solid #6f42c1 !important; }
  </style>
</head>
<body class="container py-3">
  <header class="d-flex flex-wrap gap-3 align-items-center border-bottom pb-3 mb-3">
    <a class="navbar-brand fw-bold" href="/arkiv">Viva-arkiv</a>
    <a class="small" href="/arkiv/exempel">exempel</a>
    <form class="d-flex flex-grow-1" action="/arkiv/sok" method="get" role="search">
      <input name="q" value="{{ q|default('') }}" class="form-control me-2"
             placeholder="Sök i alla meddelanden…" autofocus>
      <button class="btn btn-primary" type="submit">Sök</button>
    </form>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
